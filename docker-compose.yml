version: '3.8'
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sr_postgres
    environment:
      POSTGRES_USER: sourcerank
      POSTGRES_PASSWORD: sourcerank_dev
      POSTGRES_DB: sourcerank
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcerank"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build: ./api
    container_name: sr_api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://sourcerank:sourcerank_dev@postgres:5432/sourcerank
      - JWT_SECRET=dev-jwt-secret
      - RUNNER_URL=http://runner:3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/src:/app/src
    command: npm run dev

  # Code Runner
  runner:
    build: ./runner
    container_name: sr_runner
    environment:
      - API_URL=http://api:4000
    ports:
      - "3001:3001"
    depends_on:
      - api
    volumes:
      - ./runner/src:/app/src
    command: npm run dev

  # Yjs Relay (CRDT) - internal only
  yjs-relay:
    build: ./yjs-relay
    container_name: sr_yjs_relay
    volumes:
      - yjs_snapshots:/tmp/yjs-snapshots
    environment:
      - PORT=1234
      - JWT_SECRET=dev-jwt-secret
      - ENABLE_S3_SNAPSHOT=${ENABLE_S3_SNAPSHOT:-false}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_PREFIX=${S3_PREFIX:-yjs/}
      - S3_REGION=${S3_REGION:-us-east-1}
      - SNAPSHOT_INTERVAL=${SNAPSHOT_INTERVAL:-20}
    depends_on:
      - api

  # Frontend  
  web:
    build: ./web
    container_name: sr_web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_ENABLE_CRDT=true
    depends_on:
      - api
    volumes:
      - ./web/src:/app/src

volumes:
  postgres_data:
  yjs_snapshots:
