<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SourceRank - Yjs + Monaco Example</title>
  <style>html,body,#editor{height:100%;margin:0;padding:0}</style>
</head>
<body>
  <div style="display:flex;gap:12px;padding:8px;background:#f5f5f5;align-items:center;">
    <label>Session ID: <input id="sessionId" value="session-123" /></label>
    <label>Token: <input id="token" value="" placeholder="JWT token" style="width:360px" /></label>
    <label>Language: <input id="language" value="python" /></label>
    <button id="connect">Connect</button>
    <button id="exec">Execute (materialize)</button>
  </div>
  <div id="editor"></div>

  <!-- Dependencies (unpkg) -->
  <script src="https://unpkg.com/yjs@13.6.18/dist/yjs.js"></script>
  <script src="https://unpkg.com/monaco-editor@0.55.0/min/vs/loader.js"></script>
  <script>
    // tiny bootstrap for Monaco loader
    require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.55.0/min/vs' }})
    require(['vs/editor/editor.main'], function() {
      const editor = monaco.editor.create(document.getElementById('editor'), {
        value: '# Edite aqui...\n',
        language: 'python',
        automaticLayout: true,
      })
      window._monacoEditor = editor
    })
  </script>
  <script src="app.js"></script>
</body>
</html>
